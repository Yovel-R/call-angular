    <!-- Mobile Sidebar Overlay -->
    <div class="dash-sidebar-overlay" [class.active]="vm.sidebarOpen" (click)="vm.sidebarOpen = false"></div>

    <!-- Sidebar -->
    <aside class="dash-sidebar" [class.active]="vm.sidebarOpen" [class.minimized]="vm.sidebarMinimized">
      <div class="sidebar-nav-list">
        <div class="sidebar-top">
          <div class="sidebar-header" *ngIf="!vm.sidebarMinimized">Main Navigation</div>
        </div>

        <button class="sidebar-item" [class.active]="vm.dashTab==='overview'" (click)="vm.switchTab('overview')"
          [title]="vm.sidebarMinimized ? 'Dashboard' : ''">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-layout-grid">
            <rect width="7" height="7" x="3" y="3" rx="1" />
            <rect width="7" height="7" x="14" y="3" rx="1" />
            <rect width="7" height="7" x="14" y="14" rx="1" />
            <rect width="7" height="7" x="3" y="14" rx="1" />
          </svg>
          <span>Dashboard</span>
        </button>



        <div class="sidebar-separator sidebar-separator-tight"></div>
        <div class="sidebar-header sidebar-header-quick" *ngIf="!vm.sidebarMinimized">Quick Access</div>

        <button class="sidebar-item sidebar-action quick-import" (click)="vm.switchTab('employees')" [title]="vm.sidebarMinimized ? 'Import Leads' : ''">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="17 8 12 3 7 8" />
            <line x1="12" y1="3" x2="12" y2="15" />
          </svg>
          <span>Import Leads</span>
        </button>

        <button class="sidebar-item sidebar-action quick-add-employee" (click)="vm.switchTab('employees'); vm.openAddEmployee()"
          [title]="vm.sidebarMinimized ? 'Add Employee' : ''">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <line x1="19" y1="8" x2="19" y2="14" />
            <line x1="22" y1="11" x2="16" y2="11" />
          </svg>
          <span>Add Employee</span>
        </button>

        <button class="sidebar-item sidebar-action quick-reports" (click)="vm.dashTab='reports'; vm.selectedPeriod='custom'; vm.sidebarOpen=false"
          [title]="vm.sidebarMinimized ? 'Reports' : ''">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 3v18h18" />
            <path d="M7 14l3-3 3 2 5-6" />
          </svg>
          <span>Reports</span>
        </button>

        <div class="sidebar-separator sidebar-separator-tight"></div>
        <div class="sidebar-header" *ngIf="!vm.sidebarMinimized">Admin Views</div>

        <button class="sidebar-item" [class.active]="vm.dashTab==='leads'" (click)="vm.switchTab('leads')"
          [title]="vm.sidebarMinimized ? 'Leads' : ''">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-file-text">
            <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" />
            <polyline points="14 2 14 8 20 8" />
            <line x1="16" y1="13" x2="8" y2="13" />
            <line x1="16" y1="17" x2="8" y2="17" />
            <line x1="10" y1="9" x2="8" y2="9" />
          </svg>
          <span>Leads</span>
        </button>

        <button class="sidebar-item" [class.active]="vm.dashTab==='remarks_filter'" (click)="vm.switchTab('remarks_filter')"
          [title]="vm.sidebarMinimized ? 'Remarks Filter' : ''">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2H2v10l9.29 9.29c.94.94 2.48.94 3.42 0l6.58-6.58c.94-.94.94-2.48 0-3.42L12 2z"/>
            <path d="M7 7h.01"/>
          </svg>
          <span>Remarks Filter</span>
        </button>

        <button class="sidebar-item" [class.active]="vm.dashTab==='followups'" (click)="vm.switchTab('followups')"
          [title]="vm.sidebarMinimized ? 'Follow-ups' : ''">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-bookmark">
            <path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z" />
          </svg>
          <span>Follow-ups</span>
        </button>

        <button class="sidebar-item" [class.active]="vm.dashTab==='employees'" (click)="vm.switchTab('employees')"
          [title]="vm.sidebarMinimized ? 'Employees' : ''">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-users-2">
            <path d="M14 19a6 6 0 0 0-12 0" />
            <circle cx="8" cy="9" r="4" />
            <path d="M22 19a6 6 0 0 0-6-6 4 4 0 1 0 0-8" />
            <path d="M16 3.13a4 4 0 0 1 0 7.75" />
          </svg>
          <span>Employees</span>
        </button>

        <button class="sidebar-item" [class.active]="vm.dashTab==='reports'"
          (click)="vm.dashTab='reports'; vm.selectedPeriod='custom'; vm.sidebarOpen=false"
          [title]="vm.sidebarMinimized ? 'Periodic Reports' : ''">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-clipboard-list">
            <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2" />
            <path d="M15 2H9a1 1 0 0 0-1 1v2a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V3a1 1 0 0 0-1-1z" />
            <path d="M12 11h4" />
            <path d="M12 16h4" />
            <path d="M8 11h.01" />
            <path d="M8 16h.01" />
          </svg>
          <span>Periodic Reports</span>
        </button>

        <div class="sidebar-separator"></div>
        <div class="sidebar-header" *ngIf="!vm.sidebarMinimized">Organization</div>

        <button class="sidebar-item" [class.active]="vm.dashTab==='company'" (click)="vm.switchTab('company')"
          [title]="vm.sidebarMinimized ? 'Company Settings' : ''">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-building">
            <rect width="16" height="20" x="4" y="2" rx="2" />
            <path d="M9 22v-4h6v4" />
            <path d="M8 6h.01" />
            <path d="M16 6h.01" />
            <path d="M8 10h.01" />
            <path d="M16 10h.01" />
            <path d="M8 14h.01" />
            <path d="M16 14h.01" />
            <path d="M8 18h.01" />
            <path d="M16 18h.01" />
          </svg>
          <span>Company Settings</span>
        </button>

        <button class="sidebar-item" [class.active]="vm.dashTab==='support'" (click)="vm.switchTab('support')"
          [title]="vm.sidebarMinimized ? 'Help & Support' : ''">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-help-circle">
            <circle cx="12" cy="12" r="10" />
            <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" />
            <path d="M12 17h.01" />
          </svg>
          <span>Help & Support</span>
        </button>

        <button class="sidebar-item" [class.active]="vm.dashTab==='invoice_settings'" (click)="vm.switchTab('invoice_settings')"
          [title]="vm.sidebarMinimized ? 'Invoice Settings' : ''">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="16" y1="13" x2="8" y2="13"></line>
            <line x1="16" y1="17" x2="8" y2="17"></line>
            <polyline points="10 9 9 9 8 9"></polyline>
          </svg>
          <span>Invoice Settings</span>
        </button>

        <div class="sidebar-spacer" style="flex: 1;"></div>
      </div>

      <!-- Creative Edge Toggle -->
      <button class="edge-sidebar-toggle" (click)="vm.sidebarMinimized = !vm.sidebarMinimized"
        [class.minimized]="vm.sidebarMinimized" [title]="vm.sidebarMinimized ? 'Expand Sidebar' : 'Collapse Sidebar'">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
          stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6" />
        </svg>
      </button>
    </aside>
